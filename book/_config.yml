title: "Something"
author: Generated with Plain Text to Markdown Converter

execute:
  execute_notebooks: "off"
  exclude_patterns: []
  timeout: 30
  allow_errors: false

html:
  use_multitoc_numbering: true

sphinx:
  extra_extensions:
    - teachbooks_favourites
  config:
    language: en
    html_baseurl: "https://pipik217.github.io/something"
    html_theme_options:
      logo:
        text: "Something"
      repository_url: "https://github.com/pipik217/something"
      path_to_docs: "book"
      repository_branch: "main"
      use_edit_page_button: true
      use_repository_button: true
      use_issues_button: true
    html_show_copyright: false
    html_last_updated_fmt: ''
    external_toc_path: "_toc.yml"
    external_toc_exclude_missing: true
    git_untracked_check_dependencies: false
    git_untracked_show_sourcelink: true

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https]
  myst_links_external_new_tab: true
